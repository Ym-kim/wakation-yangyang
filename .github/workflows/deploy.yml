name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes \
            --scope clark-kims-projects \
            --token ${{ secrets.VERCEL_TOKEN }}
